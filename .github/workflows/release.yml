name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  gates:
    name: CI gates
    uses: ./.github/workflows/ci.yml

  # Each arch builds natively on its own runner (no QEMU) and pushes by
  # digest; the merge job stitches the digests into one multi-arch manifest
  # per image. A single-job two-arch build of the torch-sized backend image
  # exhausted the standard runner's disk (and QEMU made the arm64 leg crawl).
  images:
    name: Build ${{ matrix.image }} (${{ matrix.arch }})
    needs: gates
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - image: transparentrag-backend
            context: .
            dockerfile: Dockerfile.backend
            arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - image: transparentrag-backend
            context: .
            dockerfile: Dockerfile.backend
            arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          - image: transparentrag-frontend
            context: frontend
            dockerfile: frontend/Dockerfile
            arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - image: transparentrag-frontend
            context: frontend
            dockerfile: frontend/Dockerfile
            arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      # The backend's dependency layer (torch et al.) needs more scratch
      # space than a stock runner has free.
      - name: Free runner disk space
        if: matrix.image == 'transparentrag-backend'
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost || true
          df -h /
      - name: Compute lowercase image name
        id: name
        run: echo "image=ghcr.io/${OWNER,,}/${{ matrix.image }}" >> "$GITHUB_OUTPUT"
        env:
          OWNER: ${{ github.repository_owner }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ steps.name.outputs.image }},push-by-digest=true,name-canonical=true,push=true
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.image }}-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-manifests:
    name: Publish ${{ matrix.image }} manifest
    needs: images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: [transparentrag-backend, transparentrag-frontend]
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: digests-${{ matrix.image }}-*
          path: /tmp/digests
          merge-multiple: true
      - name: Compute lowercase image name
        id: name
        run: echo "image=ghcr.io/${OWNER,,}/${{ matrix.image }}" >> "$GITHUB_OUTPUT"
        env:
          OWNER: ${{ github.repository_owner }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.name.outputs.image }}
          # Tags: vX.Y.Z + X.Y + latest on release tags; vX.Y.Z-rc.N only on
          # pre-releases (metadata-action skips latest/X.Y for pre-release
          # semver); edge on main pushes.
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=edge,enable={{is_default_branch}}
      - name: Create multi-arch manifest
        working-directory: /tmp/digests
        run: |
          # shellcheck disable=SC2046 # word splitting is the point: expands to repeated -t/tag and digest args
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ steps.name.outputs.image }}@sha256:%s ' *)
      - name: Inspect manifest
        run: docker buildx imagetools inspect "${{ steps.name.outputs.image }}:${{ steps.meta.outputs.version }}"

  release:
    name: GitHub Release
    needs: merge-manifests
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Pin the release version in the env template
        run: |
          sed -i "s|^#TRANSPARENTRAG_VERSION=.*|TRANSPARENTRAG_VERSION=${GITHUB_REF_NAME}|" .env.example
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          case "$GITHUB_REF_NAME" in
            *-*) PRERELEASE_FLAG="--prerelease" ;;
          esac
          gh release create "$GITHUB_REF_NAME" \
            --verify-tag \
            --generate-notes \
            $PRERELEASE_FLAG \
            docker-compose.yml .env.example
