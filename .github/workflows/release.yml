name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  gates:
    name: CI gates
    uses: ./.github/workflows/ci.yml

  images:
    name: Build & push ${{ matrix.image }}
    needs: gates
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: transparentrag-backend
            context: .
            dockerfile: Dockerfile.backend
          - image: transparentrag-frontend
            context: frontend
            dockerfile: frontend/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - name: Compute lowercase image name
        id: name
        run: echo "image=ghcr.io/${OWNER,,}/${{ matrix.image }}" >> "$GITHUB_OUTPUT"
        env:
          OWNER: ${{ github.repository_owner }}
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.name.outputs.image }}
          # Tags: vX.Y.Z + X.Y + latest on release tags; vX.Y.Z-rc.N only on
          # pre-releases (metadata-action skips latest/X.Y for pre-release
          # semver); edge on main pushes.
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=edge,enable={{is_default_branch}}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  release:
    name: GitHub Release
    needs: images
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Pin the release version in the env template
        run: |
          sed -i "s|^#TRANSPARENTRAG_VERSION=.*|TRANSPARENTRAG_VERSION=${GITHUB_REF_NAME}|" .env.example
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          case "$GITHUB_REF_NAME" in
            *-*) PRERELEASE_FLAG="--prerelease" ;;
          esac
          gh release create "$GITHUB_REF_NAME" \
            --verify-tag \
            --generate-notes \
            $PRERELEASE_FLAG \
            docker-compose.yml .env.example
