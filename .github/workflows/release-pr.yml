name: Open release PR

# The "button" half of cutting a release: pick a bump level and this opens the
# release PR for you (same result as running `make bump-<level>` locally). The
# canonical logic lives in scripts/bump_version.py — this workflow only runs it.
# Merging the PR it opens is what tags + publishes (see release.yml).
#
# It authenticates as the "ragworks-release-bot" GitHub App (RELEASE_APP_CLIENT_ID
# + RELEASE_APP_PRIVATE_KEY secrets), not GITHUB_TOKEN, so the PR it opens triggers
# the verify CI like any other PR — GitHub suppresses workflow events raised by
# GITHUB_TOKEN, but not by an App. The App token is minted fresh per run and
# expires within the hour, so there is nothing to rotate.
#
# Triggering still requires repo write access (workflow_dispatch), so only
# maintainers can open a release PR; the App is just the identity the run acts as.
on:
  workflow_dispatch:
    inputs:
      level:
        description: "Version bump level"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - rc

# All writes go through the App token; GITHUB_TOKEN needs nothing.
permissions: {}

jobs:
  open-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Mint App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Configure git identity (the release bot)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: |
          BOT_ID=$(gh api "/users/${APP_SLUG}[bot]" --jq .id)
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${BOT_ID}+${APP_SLUG}[bot]@users.noreply.github.com"
      - name: Open release PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          UV_BIN: uv
        run: uv run python scripts/bump_version.py ${{ inputs.level }}
