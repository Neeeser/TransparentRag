name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (typecheck → lint → test)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: transparentrag_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/transparentrag_test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --locked
      - name: Typecheck (mypy strict)
        run: uv run mypy app
      - name: Lint (ruff + pylint)
        run: |
          uv run ruff check app tests
          uv run pylint --score=y --fail-under=10 app
      - name: Test (pytest, unit suite)
        run: uv run pytest

  frontend:
    name: Frontend (typecheck → lint → test → build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Verify (typecheck → lint → tests)
        run: npm run verify
      - name: Format check (prettier)
        run: npm run format:check
      - name: Build
        run: npm run build
