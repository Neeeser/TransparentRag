name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  # Cancel superseded PR runs (fast feedback); never cancel a main run, whose
  # result is the branch's recorded health.
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  backend:
    name: Backend (typecheck → lint → test)
    runs-on: ubuntu-latest
    services:
      postgres:
        # ParadeDB Postgres (pgvector + pg_search), matching the shipped
        # docker-compose image — so the BM25/lexical tests run instead of
        # skipping.
        image: paradedb/paradedb:latest-pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ragworks_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/ragworks_test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --locked
      # mypy is incremental; persisting its cache cuts the strict typecheck
      # from ~57s to ~10s on warm runs. Keyed per-sha so every run saves its
      # updated cache; restore-keys fall back to the newest prior cache.
      - name: Restore mypy cache
        uses: actions/cache@v4
        with:
          path: .mypy_cache
          key: mypy-${{ runner.os }}-${{ hashFiles('uv.lock') }}-${{ github.sha }}
          restore-keys: |
            mypy-${{ runner.os }}-${{ hashFiles('uv.lock') }}-
            mypy-${{ runner.os }}-
      - name: Typecheck (mypy strict)
        run: uv run mypy app
      - name: Lint (ruff + pylint)
        run: |
          uv run ruff check app tests
          uv run pylint --score=y --fail-under=10 app
      - name: Test (pytest, unit suite)
        run: uv run pytest

  frontend:
    name: Frontend (typecheck → lint → test → build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      # eslint (content-strategy cache), tsc (incremental tsbuildinfo), and
      # next build all reuse prior state; warm runs skip unchanged files.
      # Keyed per-sha so every run saves updated caches; restore-keys fall
      # back to the newest prior cache (PRs can restore from main's caches).
      - name: Restore lint/typecheck/build caches
        uses: actions/cache@v4
        with:
          path: |
            frontend/.eslintcache
            frontend/tsconfig.tsbuildinfo
            frontend/.next/cache
          key: frontend-caches-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            frontend-caches-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}-
            frontend-caches-${{ runner.os }}-
      - name: Verify (typecheck → lint → tests)
        run: npm run verify
      - name: Format check (prettier)
        run: npm run format:check
      - name: Build
        run: npm run build
