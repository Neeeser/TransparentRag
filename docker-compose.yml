name: ragworks

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ragworks
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ragworks
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ragworks"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: ghcr.io/neeeser/ragworks-backend:${RAGWORKS_VERSION:-latest}
    environment:
      DATABASE_URL: postgresql+psycopg://ragworks:${POSTGRES_PASSWORD}@postgres:5432/ragworks
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?set JWT_SECRET_KEY in .env}
      DEBUG: "false"
      FILE_STORAGE_PATH: /data/storage
    volumes:
      - document-storage:/data/storage
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: ghcr.io/neeeser/ragworks-frontend:${RAGWORKS_VERSION:-latest}
    environment:
      API_PROXY_TARGET: http://backend:8000
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend

volumes:
  postgres-data:
  document-storage:
