<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 560" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <!-- editor canvas dot grid -->
    <pattern id="grid" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.2" fill="#ffffff" opacity="0.05"/>
    </pattern>
    <linearGradient id="canvas" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1120"/>
      <stop offset="1" stop-color="#131a2e"/>
    </linearGradient>
    <linearGradient id="cardTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#232c47"/>
      <stop offset="1" stop-color="#1a2138"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5eead4"/>
    </marker>
    <marker id="arrowViolet" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#a78bfa"/>
    </marker>
  </defs>

  <!-- canvas -->
  <rect x="0" y="0" width="1180" height="560" rx="18" fill="url(#canvas)"/>
  <rect x="0" y="0" width="1180" height="560" rx="18" fill="url(#grid)"/>
  <rect x="0.5" y="0.5" width="1179" height="559" rx="18" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>

  <!-- editor chrome -->
  <g font-size="12" fill="#8b94ad">
    <text x="28" y="34" font-size="13" font-weight="600" fill="#c9d2ea">⌘ pipeline editor</text>
    <text x="1152" y="34" text-anchor="end">validated ✓ · v7 pinned to run #142</text>
  </g>
  <line x1="20" y1="48" x2="1160" y2="48" stroke="#ffffff" stroke-opacity="0.07"/>

  <!-- lane labels -->
  <text x="28" y="86" font-size="11" letter-spacing="2.5" fill="#5eead4" opacity="0.85" font-weight="700">INGESTION</text>
  <text x="28" y="330" font-size="11" letter-spacing="2.5" fill="#a78bfa" opacity="0.9" font-weight="700">RETRIEVAL</text>

  <!-- ================= EDGES (behind nodes) ================= -->
  <g fill="none" stroke-width="2.2">
    <!-- ingestion: upload -> parser -->
    <path d="M158,148 C190,148 196,148 228,148" stroke="#5eead4" opacity="0.9" marker-end="url(#arrow)"/>
    <!-- parser -> chunker -->
    <path d="M388,148 C420,148 426,148 458,148" stroke="#5eead4" opacity="0.9" marker-end="url(#arrow)"/>
    <!-- chunker -> embedder -->
    <path d="M618,148 C650,148 656,148 688,148" stroke="#5eead4" opacity="0.9" marker-end="url(#arrow)"/>
    <!-- embedder -> indexer -->
    <path d="M848,148 C880,148 886,148 918,148" stroke="#5eead4" opacity="0.9" marker-end="url(#arrow)"/>
    <!-- indexer -> pinecone (down) -->
    <path d="M995,196 C995,225 995,235 995,258" stroke="#5eead4" opacity="0.8" marker-end="url(#arrow)"/>
    <!-- pinecone -> retriever (down-left into top port) -->
    <path d="M918,296 C720,296 570,290 570,338" stroke="#a78bfa" opacity="0.9" marker-end="url(#arrowViolet)"/>
    <!-- retrieval: query -> query embedder -->
    <path d="M158,390 C190,390 196,390 228,390" stroke="#a78bfa" opacity="0.9" marker-end="url(#arrowViolet)"/>
    <!-- query embedder -> retriever -->
    <path d="M388,390 C420,390 426,390 458,390" stroke="#a78bfa" opacity="0.9" marker-end="url(#arrowViolet)"/>
    <!-- retriever -> reranker -->
    <path d="M618,390 C650,390 656,390 688,390" stroke="#a78bfa" opacity="0.9" marker-end="url(#arrowViolet)"/>
    <!-- reranker -> chat -->
    <path d="M848,390 C880,390 886,390 918,390" stroke="#a78bfa" opacity="0.9" marker-end="url(#arrowViolet)"/>
  </g>

  <!-- ================= NODE CARDS ================= -->
  <!-- helper visual language: 160x96 card, header bar, config lines, in/out ports -->

  <!-- Upload (source) -->
  <g filter="url(#soft)">
    <rect x="28" y="112" width="130" height="72" rx="10" fill="url(#cardTop)" stroke="#5eead4" stroke-opacity="0.35"/>
    <text x="44" y="138" font-size="13" font-weight="600" fill="#e8edf8">📄 upload</text>
    <text x="44" y="160" font-size="10.5" fill="#8b94ad">pdf · txt</text>
    <circle cx="158" cy="148" r="5" fill="#5eead4" filter="url(#glow)"/>
  </g>

  <!-- Parser -->
  <g filter="url(#soft)">
    <rect x="228" y="104" width="160" height="88" rx="10" fill="url(#cardTop)" stroke="#5eead4" stroke-opacity="0.35"/>
    <text x="246" y="130" font-size="13" font-weight="600" fill="#e8edf8">parser</text>
    <text x="330" y="130" font-size="9.5" fill="#5eead4" opacity="0.8">3.1s ✓</text>
    <line x1="240" y1="140" x2="376" y2="140" stroke="#ffffff" stroke-opacity="0.07"/>
    <text x="246" y="158" font-size="10.5" fill="#8b94ad">file-type router</text>
    <text x="246" y="174" font-size="10.5" fill="#8b94ad">pdf → text + pages</text>
    <circle cx="228" cy="148" r="5" fill="#5eead4"/>
    <circle cx="388" cy="148" r="5" fill="#5eead4" filter="url(#glow)"/>
  </g>

  <!-- Chunker -->
  <g filter="url(#soft)">
    <rect x="458" y="104" width="160" height="88" rx="10" fill="url(#cardTop)" stroke="#5eead4" stroke-opacity="0.35"/>
    <text x="476" y="130" font-size="13" font-weight="600" fill="#e8edf8">chunker</text>
    <text x="560" y="130" font-size="9.5" fill="#5eead4" opacity="0.8">0.4s ✓</text>
    <line x1="470" y1="140" x2="606" y2="140" stroke="#ffffff" stroke-opacity="0.07"/>
    <text x="476" y="158" font-size="10.5" fill="#8b94ad">strategy: semantic</text>
    <text x="476" y="174" font-size="10.5" fill="#8b94ad">size 512 · overlap 64</text>
    <circle cx="458" cy="148" r="5" fill="#5eead4"/>
    <circle cx="618" cy="148" r="5" fill="#5eead4" filter="url(#glow)"/>
  </g>

  <!-- Embedder -->
  <g filter="url(#soft)">
    <rect x="688" y="104" width="160" height="88" rx="10" fill="url(#cardTop)" stroke="#5eead4" stroke-opacity="0.35"/>
    <text x="706" y="130" font-size="13" font-weight="600" fill="#e8edf8">embedder</text>
    <text x="790" y="130" font-size="9.5" fill="#5eead4" opacity="0.8">6.8s ✓</text>
    <line x1="700" y1="140" x2="836" y2="140" stroke="#ffffff" stroke-opacity="0.07"/>
    <text x="706" y="158" font-size="10.5" fill="#8b94ad">qwen3-embedding</text>
    <text x="706" y="174" font-size="10.5" fill="#8b94ad">dim 1024 · via OpenRouter</text>
    <circle cx="688" cy="148" r="5" fill="#5eead4"/>
    <circle cx="848" cy="148" r="5" fill="#5eead4" filter="url(#glow)"/>
  </g>

  <!-- Indexer -->
  <g filter="url(#soft)">
    <rect x="918" y="104" width="154" height="88" rx="10" fill="url(#cardTop)" stroke="#5eead4" stroke-opacity="0.35"/>
    <text x="936" y="130" font-size="13" font-weight="600" fill="#e8edf8">indexer</text>
    <text x="1014" y="130" font-size="9.5" fill="#5eead4" opacity="0.8">1.2s ✓</text>
    <line x1="930" y1="140" x2="1060" y2="140" stroke="#ffffff" stroke-opacity="0.07"/>
    <text x="936" y="158" font-size="10.5" fill="#8b94ad">namespace: col-7f2</text>
    <text x="936" y="174" font-size="10.5" fill="#8b94ad">upserted 214 vectors</text>
    <circle cx="918" cy="148" r="5" fill="#5eead4"/>
    <circle cx="995" cy="192" r="5" fill="#5eead4" filter="url(#glow)"/>
  </g>

  <!-- Pinecone store -->
  <g filter="url(#soft)">
    <rect x="918" y="258" width="154" height="76" rx="38" fill="#101728" stroke="#e2e8f0" stroke-opacity="0.25"/>
    <text x="995" y="290" font-size="13" font-weight="600" fill="#e8edf8" text-anchor="middle">🌲 Pinecone</text>
    <text x="995" y="310" font-size="10.5" fill="#8b94ad" text-anchor="middle">vector index</text>
    <circle cx="918" cy="296" r="5" fill="#a78bfa" filter="url(#glow)"/>
  </g>

  <!-- Query (source) -->
  <g filter="url(#soft)">
    <rect x="28" y="354" width="130" height="72" rx="10" fill="url(#cardTop)" stroke="#a78bfa" stroke-opacity="0.4"/>
    <text x="44" y="380" font-size="13" font-weight="600" fill="#e8edf8">❓ query</text>
    <text x="44" y="402" font-size="10.5" fill="#8b94ad">chat · search</text>
    <circle cx="158" cy="390" r="5" fill="#a78bfa" filter="url(#glow)"/>
  </g>

  <!-- Query embedder -->
  <g filter="url(#soft)">
    <rect x="228" y="346" width="160" height="88" rx="10" fill="url(#cardTop)" stroke="#a78bfa" stroke-opacity="0.4"/>
    <text x="246" y="372" font-size="13" font-weight="600" fill="#e8edf8">embedder</text>
    <text x="330" y="372" font-size="9.5" fill="#a78bfa" opacity="0.9">0.3s ✓</text>
    <line x1="240" y1="382" x2="376" y2="382" stroke="#ffffff" stroke-opacity="0.07"/>
    <text x="246" y="400" font-size="10.5" fill="#8b94ad">same model as ingest</text>
    <text x="246" y="416" font-size="10.5" fill="#8b94ad">dim check enforced</text>
    <circle cx="228" cy="390" r="5" fill="#a78bfa"/>
    <circle cx="388" cy="390" r="5" fill="#a78bfa" filter="url(#glow)"/>
  </g>

  <!-- Retriever -->
  <g filter="url(#soft)">
    <rect x="458" y="346" width="160" height="88" rx="10" fill="url(#cardTop)" stroke="#a78bfa" stroke-opacity="0.4"/>
    <text x="476" y="372" font-size="13" font-weight="600" fill="#e8edf8">retriever</text>
    <text x="560" y="372" font-size="9.5" fill="#a78bfa" opacity="0.9">0.6s ✓</text>
    <line x1="470" y1="382" x2="606" y2="382" stroke="#ffffff" stroke-opacity="0.07"/>
    <text x="476" y="400" font-size="10.5" fill="#8b94ad">top_k: 8</text>
    <text x="476" y="416" font-size="10.5" fill="#8b94ad">scores + metadata</text>
    <circle cx="458" cy="390" r="5" fill="#a78bfa"/>
    <circle cx="618" cy="390" r="5" fill="#a78bfa" filter="url(#glow)"/>
    <circle cx="570" cy="346" r="5" fill="#a78bfa"/>
  </g>

  <!-- Reranker -->
  <g filter="url(#soft)">
    <rect x="688" y="346" width="160" height="88" rx="10" fill="url(#cardTop)" stroke="#a78bfa" stroke-opacity="0.4"/>
    <text x="706" y="372" font-size="13" font-weight="600" fill="#e8edf8">reranker</text>
    <text x="790" y="372" font-size="9.5" fill="#a78bfa" opacity="0.9">0.9s ✓</text>
    <line x1="700" y1="382" x2="836" y2="382" stroke="#ffffff" stroke-opacity="0.07"/>
    <text x="706" y="400" font-size="10.5" fill="#8b94ad">cross-encoder</text>
    <text x="706" y="416" font-size="10.5" fill="#8b94ad">keep top 4</text>
    <circle cx="688" cy="390" r="5" fill="#a78bfa"/>
    <circle cx="848" cy="390" r="5" fill="#a78bfa" filter="url(#glow)"/>
  </g>

  <!-- Chat LLM -->
  <g filter="url(#soft)">
    <rect x="918" y="346" width="154" height="88" rx="10" fill="url(#cardTop)" stroke="#f0abfc" stroke-opacity="0.4"/>
    <text x="936" y="372" font-size="13" font-weight="600" fill="#e8edf8">🤖 chat LLM</text>
    <line x1="930" y1="382" x2="1060" y2="382" stroke="#ffffff" stroke-opacity="0.07"/>
    <text x="936" y="400" font-size="10.5" fill="#8b94ad">any OpenRouter model</text>
    <text x="936" y="416" font-size="10.5" fill="#8b94ad">tool calls · SSE stream</text>
    <circle cx="918" cy="390" r="5" fill="#a78bfa"/>
  </g>

  <!-- ================= TRACE BAR ================= -->
  <g>
    <rect x="28" y="472" width="1124" height="60" rx="12" fill="#0a0f1c" stroke="#fbbf24" stroke-opacity="0.35" stroke-dasharray="5 4"/>
    <text x="52" y="497" font-size="12.5" font-weight="600" fill="#fbbf24">🔬 execution trace — every node above recorded its exact input and output</text>
    <g font-size="10.5" fill="#8b94ad">
      <text x="52" y="518">parser: 12 pages → 41 kB text</text>
      <text x="300" y="518">chunker: → 214 chunks</text>
      <text x="490" y="518">embedder: 214 × dim 1024</text>
      <text x="700" y="518">retriever: 8 hits, top score 0.91</text>
      <text x="940" y="518">click any node to inspect ↗</text>
    </g>
  </g>

  <!-- dotted drop lines from lanes into trace bar -->
  <g stroke="#fbbf24" stroke-opacity="0.3" stroke-width="1.4" stroke-dasharray="2 5">
    <line x1="308" y1="192" x2="308" y2="342"/>
    <line x1="308" y1="438" x2="308" y2="472"/>
    <line x1="538" y1="438" x2="538" y2="472"/>
    <line x1="768" y1="438" x2="768" y2="472"/>
    <line x1="995" y1="438" x2="995" y2="472"/>
  </g>
</svg>
